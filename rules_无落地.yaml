rules:
  # Telegram（补充 Web 端域名）
  - "DOMAIN,web.telegram.org,📲 电报消息"
  - "DOMAIN,webk.telegram.org,📲 电报消息"
  - "DOMAIN,webz.telegram.org,📲 电报消息"
  - "DOMAIN,api.telegram.org,📲 电报消息"
  - "DOMAIN,core.telegram.org,📲 电报消息"
  - "DOMAIN-SUFFIX,t.me,📲 电报消息"
  - "DOMAIN-SUFFIX,telegram.org,📲 电报消息"
  - "DOMAIN-SUFFIX,telegram.me,📲 电报消息"
  - "DOMAIN-SUFFIX,telegramcdn.org,📲 电报消息"
  - "DOMAIN-SUFFIX,telesco.pe,📲 电报消息"
  - "DOMAIN-SUFFIX,telegra.ph,📲 电报消息"

  # 进程优先
  - "PROCESS-NAME,dota2.exe,🔗 全局直连"
  - "PROCESS-NAME,steam.exe,🔗 全局直连"
  # 微软账号/OneDrive 进程补充（命中后交给「Ⓜ️ 微软服务」）
