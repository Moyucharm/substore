  - "DOMAIN,bard.google.com,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,google.com,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,ai.google.dev,🔮 Google+Gemini"
  - "DOMAIN,makersuite.google.com,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,gstatic.com,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,googleusercontent.com,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,googleapis.com,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,googleapis.cn,🔮 Google+Gemini"
  - "DOMAIN-SUFFIX,xn--ngstr-lra8j.com,🔮 Google+Gemini"
  - "RULE-SET,google,🔮 Google+Gemini"
  - "RULE-SET,google-gemini,🔮 Google+Gemini"

  # 常见直达模式选择域名
  - "DOMAIN-SUFFIX,github.io,🔰 模式选择"
  - "DOMAIN,v2rayse.com,🔰 模式选择"

  # AI 分流
  - "RULE-SET,openai,💬 ChatGPT-Claude-XAI-Perplexity"
  - "RULE-SET,anthropic,💬 ChatGPT-Claude-XAI-Perplexity"
  - "RULE-SET,xai,💬 ChatGPT-Claude-XAI-Perplexity"
  - "RULE-SET,perplexity,💬 ChatGPT-Claude-XAI-Perplexity"

  # 其它服务（保持与旧 rules.yaml 一致：统一走 🔰 模式选择）
  - "RULE-SET,pikpak,🔰 模式选择"
  - "RULE-SET,bybit,🔰 模式选择"

  # 系统/直连/拦截
  - "RULE-SET,applications,🔗 全局直连"
  - "RULE-SET,private,🔗 全局直连"
  # 番茄小说广告补充（含穿山甲广告域）
  - "DOMAIN,dig.bdurl.net,🥰 广告过滤"
  - "DOMAIN,dig.zjurl.cn,🥰 广告过滤"
  - "DOMAIN,log5-applog.fqnovel.com,🥰 广告过滤"
  - "DOMAIN,rtlog5-applog.fqnovel.com,🥰 广告过滤"
  - "DOMAIN-SUFFIX,pglstatp-toutiao.com,🥰 广告过滤"
  - "DOMAIN-SUFFIX,pangolin-sdk-toutiao.com,🥰 广告过滤"
  - "DOMAIN-SUFFIX,pangolin-sdk-toutiao-b.com,🥰 广告过滤"
  - "RULE-SET,reject,🥰 广告过滤"

  # 服务分流
  - "RULE-SET,microsoft,Ⓜ️ 微软服务"
  - "RULE-SET,icloud,🍎 苹果服务"
  - "RULE-SET,apple,🍎 苹果服务"

  # 常规出国流量（保持原有顺序）
  - "RULE-SET,proxy,🔰 模式选择"
  - "RULE-SET,gfw,🔰 模式选择"
  - "RULE-SET,tld-not-cn,🔰 模式选择"

  # 直连优先
  - "RULE-SET,direct,🔗 全局直连"
  - "RULE-SET,lancidr,🔗 全局直连,no-resolve"
  - "RULE-SET,cncidr,🔗 全局直连,no-resolve"
  - "RULE-SET,telegramcidr,📲 电报消息,no-resolve"
  - "GEOIP,LAN,🔗 全局直连,no-resolve"
  - "GEOIP,CN,🔗 全局直连,no-resolve"

  # 兜底：未命中规则默认走「🐟 漏网之鱼」
  - "MATCH,🐟 漏网之鱼"

proxy-groups:
  # 你的“模式选择”入口：一般流量进来首选这里
  - name: "🔰 模式选择"
    type: select
    proxies:
      - "⚙️ 节点选择"
      - "🔗 全局直连"
    interval: 3600
    timeout: 3000
    url: "https://www.google.com/generate_204"
    lazy: true
    max-failed-times: 3
    hidden: false

  # 节点选择：包含所有节点（中继/落地/家宽）
  - name: "⚙️ 节点选择"
    type: select
    proxies:
      - "♻️ 延迟选优"
    include-all: true
    # exclude-filter: "(?i)落地|家宽" # 已移除过滤器
    interval: 3600
    timeout: 3000
    url: "https://www.google.com/generate_204"
    lazy: true
    max-failed-times: 3
    hidden: false
    icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io/main/docs/assets/icons/adjust.svg"

  # “自动优选”：包含所有节点
  - name: "♻️ 延迟选优"
    type: url-test
    tolerance: 50
    include-all: true
    # exclude-filter: "(?i)落地|家宽" # 已移除过滤器
    interval: 3600
    timeout: 3000
    url: "https://www.google.com/generate_204"
    lazy: true
    max-failed-times: 3
    hidden: false
    icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io/main/docs/assets/icons/speed.svg"

  # AI 组（含 OpenAI / Claude / XAI / Perplexity）
  - name: "💬 ChatGPT-Claude-XAI-Perplexity"
    type: select
    proxies:
      - "🔰 模式选择"
      - "⚙️ 节点选择"
