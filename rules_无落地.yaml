# Substore 兼容 Mihomo / Mihomo Party 配置（rules 精简版）
# 目标：
# 1) 保持并修正 DNS 防泄露（DNS 出口指向 🔰 模式选择，避免名称不一致导致失效）
# 2) 不改变现有分流逻辑前提下，降低内存占用：服务类策略组不再 include-all（避免重复挂载全部节点）
# 3) 🔮 Gemini 组改为「🔮 Google+Gemini」，并承载全部 Google（含 Gemini）分流
# 4) Telegram 补充 Web 端域名规则（仅靠 telegramcidr 可能无法覆盖 web.telegram.org）
# 5) 🍎/Ⓜ️ 服务组仅保留选择器（模式/节点/落地/直连）
# 6) 去除无实际作用的「❌ 全局拦截」，以及「🐟 漏网之鱼」兜底（兜底直接走 🔰 模式选择）
# 7) 本版本保留“无落地”链式 + 延迟选优筛选定制

dns:
  enable: true
  prefer-h3: false
  listen: "0.0.0.0:1053"
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "localhost.ptlogin2.qq.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.googleapis.com"
    - "+.googleapis.cn"
    - "alt1-mtalk.google.com"
    - "alt2-mtalk.google.com"
    - "alt3-mtalk.google.com"
    - "alt4-mtalk.google.com"
    - "alt5-mtalk.google.com"
    - "alt6-mtalk.google.com"
    - "alt7-mtalk.google.com"
    - "alt8-mtalk.google.com"
    - "mtalk.google.com"
  use-hosts: true

  # 仅用于引导解析代理域名：直连且不经代理
  default-nameserver:
    - "114.114.114.114#DIRECT"
    - "223.5.5.5#DIRECT"
    - "119.29.29.29#DIRECT"
    - "180.76.76.76#DIRECT"
    - "180.184.1.1#DIRECT"

  # 给“代理服务器域名解析”用：直连 DoH，避免代理循环
  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query#DIRECT"
    - "https://doh.pub/dns-query#DIRECT"
    - "https://doh.onedns.net/dns-query#DIRECT"

  # 业务域名解析：全部走代理组（防泄露）
  nameserver:
    - "https://cloudflare-dns.com/dns-query#🔰 模式选择"
    - "https://dns.google/dns-query#🔰 模式选择"
    - "https://dns.quad9.net/dns-query#🔰 模式选择"

  # 指定域名/集合的解析策略：能直连的就直连 DoH，易泄露/跨域的走代理 DoH
  nameserver-policy:
    "geosite:cn":
      - "https://dns.alidns.com/dns-query#DIRECT"
      - "https://doh.pub/dns-query#DIRECT"
    "+.msftconnecttest.com,+.msftncsi.com": "https://cloudflare-dns.com/dns-query#🔰 模式选择"
    "+.googleapis.com,+.googleapis.cn": "https://cloudflare-dns.com/dns-query#🔰 模式选择"


tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53 # 劫持所有 53 UDP/TCP
  device: SakuraiTunnel
  mtu: 1500 # 9000 容易出问题；不稳就用 1500/1480
  endpoint-independent-nat: true

